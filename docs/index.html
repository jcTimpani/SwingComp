<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drumset Music Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />

    <!-- Include External CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="stylesheet" href="assets/css/navBar.css" />
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon" />

    <!-- VexFlow Script -->
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
</head>

<body>
    <!-- Navigation Bar -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="#">Swing Comp</a>
                <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="page-shell">
        <section class="container body-content">
            <div class="hero-copy">
                <p class="eyebrow">Swing Independence Practice</p>
                <h1>Music Generator</h1>
                <p class="subhead">Build coordination patterns instantly, then read them directly on the staff.</p>
            </div>

            <!-- Form for ostinato selection -->
            <div id="settings-panel">
                <button type="button" id="toggle-controls-btn" aria-expanded="true">Hide Settings</button>

                <form id="ostinato-form">

                <label for="num-measures">Number of Measures:</label>
                <select id="num-measures">
                    <option value="1" selected>1</option>
                    <option value="2">2</option>
                    <option value="4">4</option>
                    <option value="8">8</option>
                    <option value="12">12</option>
                    <option value="16">16</option>
                    <option value="24">24</option>
                    <option value="32">32</option>
                    <option value="48">48</option>
                    <option value="64">64</option>
                </select>

                <label for="difficulty">Select Difficulty:</label>
                <select id="difficulty">
                    <option value="1">Level 1 - Downbeats only</option>
                    <option value="2">Level 2 - Downbeats and 3rd triplet partial</option>
                    <option value="3">Level 3 - All triplets</option>
                </select>

                <label for="voice-select">Choose a voice:</label>
                <select id="voice-select">
                    <option value="snare">Snare Only</option>
                    <option value="bass">Bass Only</option>
                    <option value="both">Both</option>
                </select>

                    <button type="button" id="generate-btn">Generate Music</button>
                </form>
            </div>

            <!-- Container for VexFlow SVG output -->
            <div id="output" class="is-hidden"></div>

            <hr />
            <footer>
                <p></p>
            </footer>
        </section>
    </main>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/test.js"></script>
</body>
</html>
